<!DOCTYPE html>
<html>
<head>
    <title>Simple Web Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .card{
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        button{
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover{
            background: #2f80ed;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Hello 👋</h1>
        <p>This is a simple web page.</p>
        <button>Click Me</button>
    </div>

</body>
</html>
